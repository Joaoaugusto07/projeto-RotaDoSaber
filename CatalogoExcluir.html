<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Livros - Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            font-size: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-buttons {
            display: flex;
            gap: 10px;
        }
        .button {
            background-color: white;
            color: #4CAF50;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            text-decoration: none;
        }
        .button:hover {
            background-color: #ddd;
        }
        section {
            padding: 20px;
            margin: 20px;
        }
        .lista-livros {
            background-color: #f2f2f2;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: 0 auto;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: white;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-button {
            background-color: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
        }
        .delete-button:hover {
            background-color: darkred;
        }
        footer {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <div>Cadastro de Livros</div>
        <div class="header-buttons">
            <a href="index.html" class="button">Início</a>
            <a href="login.html" class="button">Login</a>
        </div>
    </header>

    <section class="lista-livros">
        <h2>Lista de Livros</h2>
        <ul id="listaLivros"></ul>
    </section>

    <footer>
        Projeto Cultura Startup
    </footer>

    <script>
        // Configuração do Supabase
        const SUPABASE_URL = "https://wofpvlmkclgdpjeugiid.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvZnB2bG1rY2xnZHBqZXVnaWlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIzMjAyNzIsImV4cCI6MjA1Nzg5NjI3Mn0.Nwr8OM_HF2LUNcpf6P3I6L4MUtNCRyucUPWP3YUa6FI"; // Substitua pela chave correta

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Função para listar livros
        async function listarLivros() {
            let { data, error } = await supabaseClient.from("BOOKS").select("*");

            if (error) {
                alert("Erro ao listar livros: " + error.message);
            } else {
                let lista = document.getElementById("listaLivros");
                lista.innerHTML = "";
                data.forEach(livro => {
                    let item = document.createElement("li");
                    item.innerHTML = `
                        ${livro.id}: "${livro.titulo}" - ${livro.autor} (${livro.ano_publicacao})
                        <button class="delete-button" onclick="excluirLivro(${livro.id})">Resgatar</button>
                    `;
                    lista.appendChild(item);
                });
            }
        }

        // Função para excluir um livro
        async function excluirLivro(id) {
            if (confirm("Tem certeza que deseja Resgatar este livro?")) {
                let { error } = await supabaseClient.from("BOOKS").delete().eq("id", id);

                if (error) {
                    alert("Erro ao Resgatar o livro: " + error.message);
                } else {
                    alert("Livro Resgatado com sucesso!");
                    listarLivros(); // Atualiza a lista após exclusão
                }
            }
        }

        // Carregar livros ao abrir a página
        document.addEventListener("DOMContentLoaded", listarLivros);
    </script>
</body>
</html>
